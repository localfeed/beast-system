name: Deploy Edge Functions

on:
  workflow_dispatch:
    # Trigger manually once SUPABASE_ACCESS_TOKEN and SUPABASE_PROJECT_REF secrets are set

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          supabase functions deploy beast-ingest
          supabase functions deploy beast-generate
          supabase functions deploy beast-publish
